<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGC.FUN</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
  
  body {
    background: #000;
    color: #fff;
    overflow: hidden;
  }

  /* Fondo de estrellas */
  #stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
  }

  header {
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #222;
    backdrop-filter: blur(5px);
  }
  
  header h1 { color: #00f7ff; text-shadow: 0 0 10px #00f7ff; }

  nav button {
    background: #111;
    border: 1px solid #00f7ff;
    color: #00f7ff;
    padding: 10px 20px;
    margin: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }
  
  nav button:hover {
    background: #00f7ff;
    color: #000;
    box-shadow: 0 0 15px #00f7ff;
  }

  .container { padding: 30px; text-align: center; }

  .card {
    background: rgba(17,17,17,0.8);
    border: 1px solid #333;
    padding: 20px;
    border-radius: 12px;
    margin: 20px auto;
    max-width: 500px;
    backdrop-filter: blur(10px);
  }

  input {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #555;
    background: #222;
    color: #fff;
    margin: 5px;
  }

  .time-btn {
    background: #222;
    border: 1px solid #555;
    color: #fff;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 6px;
    cursor: pointer;
  }
  .time-btn.active {
    background: #00f7ff;
    color: #000;
    border-color: #00f7ff;
  }

  #gameArea {
    width: 100%;
    height: 200px;
    background: rgba(0,247,255,0.05);
    border: 2px dashed #00f7ff;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-top: 15px;
    cursor: pointer;
    user-select: none;
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
  <h1>LGC.FUN</h1>
  <nav>
    <button onclick="show('menu')">Menú</button>
    <button onclick="show('about')">Sobre Nosotros</button>
    <button onclick="show('lab')">Laboratorio</button>
    <button onclick="show('login')">Login</button>
  </nav>
</header>

<div class="container">
  <div id="menu" class="card">
    <h2>Bienvenido al Laboratorio</h2>
    <p>Probá el Experimento #1: Click de Estrellas</p>
  </div>

  <div id="about" class="card" style="display:none">
    <h2>Sobre Nosotros</h2>
    <p>Somos LGC. Hacemos cosas raras con código y nos divertimos.</p>
  </div>

  <div id="lab" class="card" style="display:none">
    <h2>Experimento #1: Click de Estrellas</h2>
    <p>Elegí el tiempo y hace click como loco</p>
    
    <div>
      <button class="time-btn" onclick="setTime(1)">1s</button>
      <button class="time-btn" onclick="setTime(2)">2s</button>
      <button class="time-btn active" onclick="setTime(5)">5s</button>
      <button class="time-btn" onclick="setTime(10)">10s</button>
    </div>

    <button onclick="startGame()">Empezar</button>
    <h3 id="score">Puntaje: 0</h3>
    <h3 id="timer">Tiempo: 5s</h3>
    <div id="gameArea" onclick="count()">Haz Click Aquí</div>
  </div>

  <div id="login" class="card" style="display:none">
    <h2>Login</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p id="msg"></p>
  </div>
</div>

<script>
// Estrellas moviéndose
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
for(let i=0; i<150; i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1 + 0.5
  });
}

function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    s.y += s.d;
    if(s.y > canvas.height){ s.y = 0; s.x = Math.random()*canvas.width; }
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// Navegación
function show(id){
  document.querySelectorAll('.card').forEach(c=>c.style.display='none');
  document.getElementById(id).style.display='block';
}

// Juego de clicks
let clicks = 0;
let playing = false;
let gameTime = 5;
let timeLeft = 5;
let timerInterval;

function setTime(t){
  gameTime = t;
  timeLeft = t;
  document.getElementById('timer').innerText = 'Tiempo: ' + t + 's';
  document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function startGame(){
  clicks = 0;
  timeLeft = gameTime;
  playing = true;
  document.getElementById('score').innerText = 'Puntaje: 0';
  document.getElementById('gameArea').innerText = '¡CLICK!';
  
  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').innerText = 'Tiempo: ' + timeLeft + 's';
    if(timeLeft <= 0){
      clearInterval(timerInterval);
      playing = false;
      document.getElementById('gameArea').innerText = 'Haz Click Aquí';
      alert('Terminaste! Puntaje: ' + clicks);
    }
  }, 1000);
}

function count(){ 
  if(playing){ 
    clicks++; 
    document.getElementById('score').innerText = 'Puntaje: ' + clicks; 
  } 
}

// Login fake
function login(){
  const u = document.getElementById('user').value;
  if(u) document.getElementById('msg').innerText = 'Bienvenido ' + u;
  else document.getElementById('msg').innerText = 'Ingresa usuario';
}

window.onresize = ()=>{ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
</script>

</body>
  </html>
