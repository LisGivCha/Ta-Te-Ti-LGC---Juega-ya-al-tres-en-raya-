<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGC.FUN v1.3.2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#000;color:#fff;text-align:center}
header{padding:20px;border-bottom:1px solid #222}
header h1{color:#00f7ff;font-size:32px}
nav button{background:#111;border:1px solid #00f7ff;color:#00f7ff;padding:10px;margin:5px;border-radius:8px;cursor:pointer}
.card{background:#111;border:1px solid #333;padding:20px;margin:20px auto;width:90%;max-width:600px;display:none;border-radius:10px}
.card.active{display:block}
.lab-btn{padding:12px;margin:8px;width:90%;background:#222;border:1px solid #00f7ff;color:#00f7ff;border-radius:8px;cursor:pointer}
.exp{display:none}
#gameArea{height:150px;border:2px dashed #00f7ff;margin:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
#canvasDraw{background:#222;border:2px solid #00f7ff;cursor:crosshair}
#tateti{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:200px;margin:10px auto}
.celda{height:60px;background:#222;border:1px solid #444;display:flex;align-items:center;justify-content:center;font-size:30px;color:#00f7ff;cursor:pointer}
#ball{width:20px;height:20px;background:#00f7ff;border-radius:50%;position:absolute}
#gravedadArea{height:200px;border:2px dashed #00f7ff;position:relative;margin:10px}
.btn{background:#00f7ff;color:#000;padding:10px 20px;border:none;border-radius:8px;margin:5px;cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<header>
<h1>LGC.FUN v1.3.2</h1>
<nav>
<button onclick="show('menu')">Menu</button>
<button onclick="show('periodico')">Periodico</button>
<button onclick="show('lab')">Laboratorio</button>
<button onclick="show('perfil')">Perfil</button>
</nav>
</header>

<div id="menu" class="card active">
<h2>Menu</h2>
<p>Version estable en 1 solo archivo</p>
</div>

<div id="periodico" class="card">
<h2>Periodico</h2>
<p><b>V1.3.2</b> - Fix menu y estrellas</p>
<p><b>V1.3.0</b> - Version estable</p>
</div>

<div id="lab" class="card">
<h2>Laboratorio</h2>
<button class="lab-btn" onclick="showExp(1)">1. Click por segundo</button>
<button class="lab-btn" onclick="showExp(2)">2. Dibujar Circulo</button>
<button class="lab-btn" onclick="showExp(3)">3. ¿Que pasaria si?</button>
<button class="lab-btn" onclick="showExp(4)">4. Gravedad</button>
<button class="lab-btn" onclick="showExp(5)">5. Ta-Te-Ti</button>

<div id="exp1" class="exp">
<h3>Click por segundo</h3>
<button class="btn" onclick="setTime(5)">5s</button>
<p id="score">Puntaje: 0</p><p id="timer">Tiempo: 5s</p>
<div id="gameArea" onclick="clickear()">Click aqui</div>
</div>

<div id="exp2" class="exp">
<h3>Dibuja un circulo</h3>
<canvas id="canvasDraw" width="300" height="150"></canvas>
<p id="circleScore">Precisión: -</p>
</div>

<div id="exp3" class="exp">
<h3>¿Que pasaria si...?</h3>
<button class="btn" onclick="alert('Si hubieran 2 soles: Dias de 48hs de luz. Caos climatico.')">2 soles</button>
<button class="btn" onclick="alert('Si pudieras volar: Sin trafico. Licencia de vuelo.') ">Volar</button>
<button class="btn" onclick="alert('Si los gatos dominaran: Siesta obligatoria de 16hs.')">Gatos</button>
</div>

<div id="exp4" class="exp">
<h3>Gravedad</h3>
<button class="btn" onclick="lanzar()">LANZAR</button>
<div id="gravedadArea" onclick="pos(event)"><div id="ball"></div></div>
</div>

<div id="exp5" class="exp">
<h3>Ta-Te-Ti</h3>
<div id="tateti"></div>
<button class="btn" onclick="reset()">Reiniciar</button>
</div>

</div>

<div id="perfil" class="card">
<h2>Perfil</h2>
<p>Mejor CPS: <span id="bestCPS">0</span></p>
</div>

<script>
function show(id){document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showExp(n){document.querySelectorAll('.exp').forEach(e=>e.style.display='none');document.getElementById('exp'+n).style.display='block';if(n==5)crear();}

let clicks=0,time=5,timer;
function setTime(t){time=t;document.getElementById('timer').innerText='Tiempo: '+t+'s'}
function clickear(){clicks++;document.getElementById('score').innerText='Puntaje: '+clicks;clearTimeout(timer);timer=setTimeout(()=>{let cps=clicks/time;alert('CPS: '+cps.toFixed(2));if(cps>localStorage.best)localStorage.best=cps;document.getElementById('bestCPS').innerText=localStorage.best||0;clicks=0},time*1000)}

const ctx=document.getElementById('canvasDraw').getContext('2d');let draw=false;
document.getElementById('canvasDraw').onmousedown=()=>{ctx.clearRect(0,0,300,150);draw=true;ctx.beginPath()}
document.getElementById('canvasDraw').onmousemove=e=>{if(!draw)return;ctx.lineTo(e.offsetX,e.offsetY);ctx.strokeStyle='#00f7ff';ctx.lineWidth=3;ctx.stroke()}
document.getElementById('canvasDraw').onmouseup=()=>{draw=false;document.getElementById('circleScore').innerText='Precisión: '+Math.floor(Math.random()*30+70)+'%'}

let x=50,y=10;
function pos(e){let r=e.target.getBoundingClientRect();x=e.clientX-r.left-10;y=10;document.getElementById('ball').style.left=x+'px';document.getElementById('ball').style.top=y+'px'}
function lanzar(){let v=0;function anim(){v+=1;y+=v;if(y>180){y=180;v=-v/2}document.getElementById('ball').style.top=y+'px';if(v>0.5)requestAnimationFrame(anim)}anim()}

let tab=['','','','',''];
function crear(){let h='';for(let i=0;i<9;i++)h+=`<div class="celda" onclick="j(${i})"></div>`;document.getElementById('tateti').innerHTML=h}
function j(i){if(tab[i]!='')return;tab[i]='X';act();if(win('X'))return alert('Ganaste');let v=tab.map((t,k)=>t==''?k:null).filter(t=>t!=null);let r=v[Math.floor(Math.random()*v.length)];tab[r]='O';act();if(win('O'))alert('Perdiste')}
function act(){document.querySelectorAll('.celda').forEach((c,i)=>c.innerText=tab[i])}
function win(j){return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(c=>c.every(i=>tab[i]==j))}
function reset(){tab=['','',''];crear()}
crear();
</script>

</body>
    </html>
