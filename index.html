<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGC.FUN v3.2.3</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
  body { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; min-height: 100vh; padding: 10px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { text-align: center; margin: 20px 0; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.8em; font-weight: bold; color: #ffd700; }
  .click-btn { width: 200px; height: 200px; margin: 20px auto; background: radial-gradient(circle, #ff6b6b, #c0392b); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2em; font-weight: bold; cursor: pointer; user-select: none; box-shadow: 0 10px 30px rgba(0,0,0,0.4); transition: transform 0.1s; }
  .click-btn:active { transform: scale(0.9); }
  .achievements { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; max-height: 400px; overflow-y: auto; }
  .achievement { background: rgba(255,255,255,0.1); padding: 10px; margin: 8px 0; border-radius: 10px; border-left: 4px solid #ffd700; }
  .achievement.locked { opacity: 0.4; border-left-color: #666; }
</style>
</head>
<body>
<div class="container">
  <h1>🔥 LGC.FUN v3.2.3 🔥</h1>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="clicks">0</div>
      <div>Clicks</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="achieved">0/300</div>
      <div>Logros</div>
    </div>
  </div>

  <div class="click-btn" id="clickBtn">CLICK!</div>

  <div class="achievements" id="achievementsList">
    <!-- Los 300 logros se generan con JS -->
  </div>
</div>

<script>
let clicks = parseInt(localStorage.getItem('lgc_clicks')) || 0;
let unlocked = JSON.parse(localStorage.getItem('lgc_unlocked')) || [];

const achievements = Array.from({length: 300}, (_, i) => ({
  id: i+1,
  name: `Logro #${i+1}`,
  desc: `Consigue ${i+1} clicks`,
  req: i+1
}));

function save() {
  localStorage.setItem('lgc_clicks', clicks);
  localStorage.setItem('lgc_unlocked', JSON.stringify(unlocked));
}

function checkAchievements() {
  achievements.forEach(a => {
    if(clicks >= a.req && !unlocked.includes(a.id)) {
      unlocked.push(a.id);
      alert(`🏆 ¡Desbloqueado! ${a.name}`);
    }
  });
  save();
  render();
}

function render() {
  document.getElementById('clicks').innerText = clicks;
  document.getElementById('achieved').innerText = `${unlocked.length}/300`;
  
  const list = document.getElementById('achievementsList');
  list.innerHTML = '';
  achievements.forEach(a => {
    const div = document.createElement('div');
    div.className = 'achievement ' + (unlocked.includes(a.id) ? '' : 'locked');
    div.innerHTML = `<b>${a.name}</b><br>${a.desc}`;
    list.appendChild(div);
  });
}

document.getElementById('clickBtn').onclick = () => {
  clicks++;
  checkAchievements();
};

render();
</script>
</body>
</html>
