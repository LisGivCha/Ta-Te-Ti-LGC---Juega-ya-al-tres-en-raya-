<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGC.FUN v1.6.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial}
body{background:#020211;color:#fff;overflow-x:hidden}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
header{padding:15px;background:rgba(0,0,0,0.9);border-bottom:2px solid #00f7ff;position:sticky;top:0;z-index:10}
h1{color:#00f7ff;text-shadow:0 0 15px #00f7ff;text-align:center;display:inline-block;width:90%}
#btnLogros{position:fixed;top:20px;left:15px;z-index:100;background:linear-gradient(90deg,#ffd700,#ffaa00);border:none;color:#000;padding:12px 15px;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 0 20px #ffd700;transition:0.3s}
#btnLogros:hover{transform:scale(1.1)}
#panelLogros{position:fixed;top:0;right:-400px;width:350px;max-width:90%;height:100%;background:#0a0a1a;border-left:3px solid #ffd700;z-index:99;transition:right 0.4s;overflow-y:auto;padding:20px;box-shadow:-5px 0 20px rgba(255,215,0,0.3)}
#panelLogros.open{right:0}
nav{display:flex;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap}
nav button{background:#0a0a1a;border:2px solid #00f7ff;color:#00f7ff;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:bold;transition:0.3s;font-size:12px}
nav button:hover,nav button.active{background:#00f7ff;color:#000;box-shadow:0 0 15px #00f7ff}
.card{display:none;padding:15px;max-width:800px;margin:10px auto}
.card.active{display:block;animation:fade 0.4s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
.btn{background:linear-gradient(90deg,#00f7ff,#0088ff);color:#000;border:none;padding:10px 18px;border-radius:8px;margin:5px;cursor:pointer;font-weight:bold;font-size:14px}
.btn-diff{background:#111;border:2px solid #00f7ff;color:#00f7ff;padding:8px 15px;border-radius:8px;margin:3px;cursor:pointer}
.btn-diff.active{background:#00f7ff;color:#000}
.card-item{background:#0a0a1a;border:1px solid #00f7ff;padding:12px;border-radius:10px;margin:8px 0;text-align:left}
#tateti{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:90%;max-width:280px;margin:15px auto;aspect-ratio:1}
.celda{aspect-ratio:1;background:#0a0a1a;border:3px solid #00f7ff;display:flex;align-items:center;justify-content:center;font-size:clamp(25px,8vw,50px);color:#00f7ff;cursor:pointer;border-radius:12px;font-weight:bold}
.celda.X{color:#00ff88}.celda.O{color:#ff0066}
#clickBox{width:160px;height:160px;background:radial-gradient(#00f7ff,#0088ff);border-radius:50%;margin:15px auto;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:35px;font-weight:bold}
.timer-btn{background:#111;border:1px solid #00f7ff;color:#00f7ff;padding:8px 12px;border-radius:8px;margin:3px;cursor:pointer}
.timer-btn.active{background:#00f7ff;color:#000}
#draw{border:2px solid #00f7ff;border-radius:10px;background:#000;touch-action:none;cursor:crosshair}
.logro{background:#0a0a1a;border:1px solid #444;padding:10px;margin:6px;border-radius:8px;text-align:left;font-size:13px}
.logro.done{border-color:#00ff88;background:rgba(0,255,136,0.1)}
input{padding:10px;border-radius:8px;border:1px solid #00f7ff;background:#0a0a1a;color:#fff;margin:5px;width:80%;max-width:300px}
.respuesta{max-height:200px;overflow-y:auto;background:#000;padding:10px;border-radius:8px;margin-top:10px;text-align:left;font-size:14px}
select{padding:8px;border-radius:8px;background:#0a0a1a;color:#fff;border:1px solid #00f7ff}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<button id="btnLogros" onclick="toggleLogros()">🏆</button>
<div id="panelLogros"><h2>Logros <span id="contLogros"></span></h2><div id="listaLogros"></div></div>

<header>
<h1>⚡ LGC.FUN v1.6.0</h1>
<nav>
<button id="b-inicio" class="active" onclick="show('inicio')">Inicio</button>
<button id="b-novedades" onclick="show('novedades')">Novedades</button>
<button id="b-periodicos" onclick="show('periodicos')">Periódicos</button>
<button id="b-laboratorio" onclick="show('laboratorio')">Laboratorio</button>
<button id="b-login" onclick="show('login')">Login</button>
</nav>
</header>

<div id="inicio" class="card active"><h2>Bienvenido a LGC.FUN 🚀</h2><p>598 líneas de pura locura</p></div>

<div id="novedades" class="card"><h2>Novedades 📰</h2><div class="card-item"><h3>v1.6.0 - Panel de Logros</h3><p>IA en TaTeTi, 60 logros, 30 escenarios, dibujo auto-borrado</p></div></div>

<div id="periodicos" class="card"><h2>Periódicos 📄</h2><div class="card-item"><h3>El LGC Diario</h3><p>"Bot de TaTeTi ahora piensa. Humanidad en peligro"</p></div></div>

<div id="laboratorio" class="card">
<h2>Laboratorio 🧪</h2>
<button class="btn" onclick="showExp('tateti')">Ta-Te-Ti</button>
<button class="btn" onclick="showExp('click')">Click CPS</button>
<button class="btn" onclick="showExp('circulo')">Círculo Perfecto</button>
<button class="btn" onclick="showExp('dibujo')">Dibujar</button>
<button class="btn" onclick="showExp('gravedad')">Gravedad</button>
<button class="btn" onclick="showExp('que')">¿Qué pasaría si?</button>
<div id="exp-area"></div>
</div>

<div id="login" class="card"><h2>Login 🔐</h2><input type="text" id="user" placeholder="Usuario"><br><input type="password" id="pass" placeholder="Contraseña"><br><button class="btn" onclick="desbloquearLogro(39)">Entrar</button></div>

<script>
let logros=Array(60).fill(false),score={w:0,e:0,l:0},clicks=0,timer=0,timerInt=null,dificultad='medio';
const nombresLogros=["Primera Victoria","100 Clicks","Artista","10s CPS","Entrar","Ganar 5","Perder 3","Empate","50 Clicks","200 Clicks","Circulo 80%","Circulo 90%","Circulo 100%","Lanzar 10 pelotas","Colision","Gravedad 1 min","Leer 5 noticias","Abrir Laboratorio","Abrir Logros","Probar los 4 exps","Click 1s","Click 2s","Click 5s","Click 20s","Leer ¿Qué pasaría?","Circulo 70%","Circulo 60%","Ganar sin perder","Perder 10","1000 Clicks","Leer todos escenarios","No tocar bordes","Click 500","Dibujar 10 veces","Gravedad 100 pelotas","Login","Salir y volver","Easter Egg","Modo Noche","Maestro LGC","Ganar Facil","Ganar Medio","Ganar Dificil","100 Dibujos","CPS 10","CPS 20","CPS 30","Colision 50","Leer 10 escenarios","Leer 20 escenarios","Circulo Perfecto 5 veces","Dibujar espiral","Dibujar cuadrado","Gravedad sin tocar bordes","TaTeTi 20 partidas","TaTeTi sin perder","Click 24h","Completista 30","Completista 60"];

function show(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');document.getElementById('b-'+id).classList.add('active');
}

function toggleLogros(){
  document.getElementById('panelLogros').classList.toggle('open');
  renderLogros();desbloquearLogro(18);
}

function desbloquearLogro(i){if(!logros[i]){logros[i]=true;alert(`🏆 Logro: ${nombresLogros[i]}`)}}

// LABORATORIO
function showExp(t){
  let html='';
  if(t=='tateti')html=`<h3>Ta-Te-Ti vs IA</h3><div><button class="btn-diff" onclick="setDif('facil')">Fácil</button><button class="btn-diff active" onclick="setDif('medio')">Medio</button><button class="btn-diff" onclick="setDif('dificil')">Difícil</button></div><div id="tateti"></div><button class="btn" onclick="resetT()">Reiniciar</button><p id="msgT"></p>`;
  if(t=='click')html=`<h3>Click por Segundo</h3><div><button class="timer-btn" onclick="setTimer(1)">1s</button><button class="timer-btn" onclick="setTimer(2)">2s</button><button class="timer-btn" onclick="setTimer(5)">5s</button><button class="timer-btn" onclick="setTimer(10)">10s</button><button class="timer-btn" onclick="setTimer(20)">20s</button></div><div id="clickBox" onclick="clickear()">0</div><p id="timeLeft">Tiempo: -</p><button class="btn" onclick="resetC()">Reset</button>`;
  if(t=='circulo')html=`<h3>Dibuja un Círculo Perfecto</h3><canvas id="draw" width="300" height="300"></canvas><p id="porcentaje">Precisión: -</p><p style="font-size:12px">Dibuja encima para borrar el anterior</p>`;
  if(t=='dibujo')html=`<h3>Dibujo Libre</h3><canvas id="draw2" width="300" height="300"></canvas><p style="font-size:12px">Dibuja encima para borrar</p>`;
  if(t=='gravedad')html=`<h3>Gravedad + Colisiones</h3><button class="btn" onclick="crearPelota()">Lanzar Pelota</button><canvas id="grav" width="300" height="350" style="border:2px solid #00f7ff;border-radius:10px;background:#000"></canvas>`;
  if(t=='que')html=`<h3>¿Qué pasaría si...?</h3><select id="escenario"></select><button class="btn" onclick="mostrarRespuesta()">Ver</button><div id="resp" class="respuesta"></div>`;
  document.getElementById('exp-area').innerHTML=html;
  if(t=='tateti')crearT();if(t=='circulo')initDraw('draw');if(t=='dibujo')initDraw('draw2');if(t=='gravedad')loopG();if(t=='que')cargarEscenarios();
}

function setDif(d){dificultad=d;document.querySelectorAll('.btn-diff').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');resetT()}

// TATETI CON IA
let tab=Array(9).fill('');function crearT(){let h='';for(let i=0;i<9;i++)h+=`<div class="celda" onclick="jugar(${i})"></div>`;document.getElementById('tateti').innerHTML=h;document.getElementById('msgT').innerText='Tu turno: X'}
function jugar(i){if(tab[i]!=''||ganar('X')||ganar('O'))return;tab[i]='X';actT();if(ganar('X')){score.w++;desbloquearLogro(0);if(dificultad=='facil')desbloquearLogro(40);if(dificultad=='medio')desbloquearLogro(41);if(dificultad=='dificil')desbloquearLogro(42);return finT('Ganaste! 🎉')}
let libres=tab.map((v,k)=>v==''?k:null).filter(v=>v!=null);if(libres.length==0){score.e++;desbloquearLogro(7);return finT('Empate! 🤝')}
let mov=ia();if(mov!=null)tab[mov]='O';actT();if(ganar('O')){score.l++;finT('Perdiste! 💀')}}
function ia(){let libres=tab.map((v,k)=>v==''?k:null).filter(v=>v!=null);if(dificultad=='facil')return libres[Math.floor(Math.random()*libres.length)];
if(dificultad=='medio'){for(let i of libres){tab[i]='O';if(ganar('O')){tab[i]='';return i}tab[i]=''}for(let i of libres){tab[i]='X';if(ganar('X')){tab[i]='';return i}tab[i]=''}return libres[Math.floor(Math.random()*libres.length)]}
for(let i of libres){tab[i]='O';if(ganar('O')){tab[i]='';return i}tab[i]=''}for(let i of libres){tab[i]='X';if(ganar('X')){tab[i]='';return i}tab[i]=''}if(tab[4]=='')return 4;return libres[0]}
function actT(){document.querySelectorAll('#tateti.celda').forEach((c,i)=>{c.innerText=tab[i];c.className='celda '+tab[i]})}
function ganar(j){return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(c=>c.every(i=>tab[i]==j))}
function finT(txt){document.getElementById('msgT').innerText=txt}function resetT(){tab=Array(9).fill('');crearT()}

// CLICK CPS
function setTimer(s){timer=s;document.querySelectorAll('.timer-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');if(timerInt)clearInterval(timerInt);let t=s;document.getElementById('timeLeft').innerText=`Tiempo: ${t}s`;
timerInt=setInterval(()=>{t--;document.getElementById('timeLeft').innerText=`Tiempo: ${t}s`;if(t<=0){clearInterval(timerInt);let cps=(clicks/timer).toFixed(2);alert(`Terminaste! ${clicks} clicks = ${cps} CPS`);if(timer==10&&cps>10)desbloquearLogro(44);if(timer==20&&cps>20)desbloquearLogro(45);if(timer==1)desbloquearLogro(20);clicks=0;document.getElementById('clickBox').innerText=0}},1000)}
function clickear(){clicks++;document.getElementById('clickBox').innerText=clicks;if(clicks>=100)desbloquearLogro(1);if(clicks>=500)desbloquearLogro(32);if(clicks>=1000)desbloquearLogro(29)}
function resetC(){clicks=0;document.getElementById('clickBox').innerText=0}

// DIBUJO Y CIRCULO - AUTO BORRADO
function initDraw(id){const draw=document.getElementById(id),dctx=draw.getContext('2d');let dib=false;
draw.onmousedown=e=>{dib=true;dctx.clearRect(0,0,300,300);dctx.beginPath();dctx.moveTo(e.offsetX,e.offsetY)}
draw.onmousemove=e=>{if(dib){dctx.lineTo(e.offsetX,e.offsetY);dctx.strokeStyle='#00f7ff';dctx.lineWidth=3;dctx.stroke()}}
draw.onmouseup=()=>{dib=false;if(id=='draw')calcularCirculo()}}

function calcularCirculo(){const draw=document.getElementById('draw'),dctx=draw.getContext('2d');
let imgData=dctx.getImageData(0,0,300,300).data;let puntos=0,cx=0,cy=0;
for(let i=0;i<imgData.length;i+=4){if(imgData[i]>50){puntos++;cx+=((i/4)%300);cy+=Math.floor((i/4)/300)}}
if(puntos<50)return;cx/=puntos;cy/=puntos;
let dists=[],prom=0;for(let i=0;i<imgData.length;i+=4){if(imgData[i]>50){let d=Math.hypot(((i/4)%300)-cx,Math.floor((i/4)/300)-cy);dists.push(d);prom+=d}}
prom/=dists.length;let varianza=dists.map(d=>Math.abs(d-prom)).reduce((a,b)=>a+b)/dists.length;let precision=Math.max(0,100-(varianza/prom)*100);
document.getElementById('porcentaje').innerText=`Precisión: ${precision.toFixed(0)}%`;desbloquearLogro(2);
if(precision>60)desbloquearLogro(26);if(precision>80)desbloquearLogro(10);if(precision>=99)desbloquearLogro(12);if(precision>=95)desbloquearLogro(50)}

// GRAVEDAD
let pelotas=[],contadorPelotas=0;function crearPelota(){pelotas.push({x:150+Math.random()*20-10,y:20,r:15,vx:Math.random()*2-1,vy:0});contadorPelotas++;if(contadorPelotas>=10)desbloquearLogro(13);if(contadorPelotas>=100)desbloquearLogro(34)}
function loopG(){const gcan=document.getElementById('grav');if(!gcan)return;const gctx=gcan.getContext('2d');gctx.clearRect(0,0,300,350);
for(let i=0;i<pelotas.length;i++){let p=pelotas[i];p.vy+=0.3;p.x+=p.vx;p.y+=p.vy;
if(p.x-p.r<0||p.x+p.r>300)p.vx*=-0.8;if(p.y+p.r>350){p.y=350-p.r;p.vy*=-0.7;p.vx*=0.9}
for(let j=i+1;j<pelotas.length;j++){let p2=pelotas[j];let dx=p2.x-p.x,dy=p2.y-p.y,dist=Math.hypot(dx,dy);
if(dist<p.r+p2.r){desbloquearLogro(14);let ang=Math.atan2(dy,dx),overlap=p.r+p2.r-dist;
p.x-=Math.cos(ang)*overlap/2;p.y-=Math.sin(ang)*overlap/2;p2.x+=Math.cos(ang)*overlap/2;p2.y+=Math.sin(ang)*overlap/2;
let dvx=p2.vx-p.vx,dvy=p2.vy-p.vy;p.vx+=dvx;p.vy+=dvy;p2.vx-=dvx;p2.vy-=dvy}}
gctx.beginPath();gctx.arc(p.x,p.y,p.r,0,6.28);gctx.fillStyle='#00f7ff';gctx.fill()}requestAnimationFrame(loopG)}

// ¿QUE PASARIA SI? 30 ESCENARIOS
const escenarios=["el sol se apaga","pudieras volar","los perros hablaran","el tiempo se detuviera","hubiera 2 lunas","no existiera internet","todos fueran invisibles","pudieras teletransportarte","lloviera chocolate","los autos volaran","no hubiera gravedad","vivieras 200 años","el mar fuera de jugo","pudieras leer mentes","no hubiera escuelas","todos tuvieran superpoderes","el dinero no existiera","pudieras respirar bajo agua","hubiera zombies","el mundo fuera cuadrado","los gatos gobernaran","pudieras duplicarte","no hubiera gravedad 1 dia","todos cantaran lo que piensan","el cielo fuera verde","pudieras pausar el tiempo","no existieran los lunes","todos midieran 3 metros","pudieras ver el futuro","internet fuera gratis para siempre"];
const respuestas=["Todo se congelaría. Adiós plantas. Hola era de hielo.","Serías el delivery más rápido. Y el más buscado por la NASA.","Primero pedirían comida. Luego dominarían el mundo.","Genial para dormir. Malo para vivir. Tu corazón se para.","Mareas de 20m. Surf extremo. Y noches clarísimas.","Volvemos al 2005. Messenger y fotolog. Qué horror.","Podrías robar pero no gastar. Serías un fantasma con tarjeta.","Llegarías tarde igual. 'Se me teletransportó el bondi'","Diabetes global. Hormigas del tamaño de perros.","El seguro aéreo costaría millones. Y los pájaros multa.","Flotas. Todo flota. Ir al baño es misión imposible.","Te aburres en 50 años. Sabiduría infinita, soledad infinita.","Peces con caries. Surfistas pegoteados.","Spoiler: tu crush no te quiere. La verdad duele.","YouTube University. Aprobar con likes.","Caos o Vengadores. 50/50.","Trueque. O piedras. O hambre.","Aquaman vibes. O ahogarte intentando.","Apunta a la cabeza. Y corre.","Física dice no. Minecraft dice sí.","Internet de fotos de comida. Y memes. Nada más.","2 de ti = el doble de problemas.","Autos chocan. Gente flota. Caos total.","Spotify en la vida real. 24/7.","Plantas mutantes. Alienígenas confundidos.","Pausa para pensar. Reanudar para arrepentirse.","Se declara feriado mundial obligatorio.","Entrar por puertas sería olímpico.","Lotería. O depresión. Elige.","Sin anuncios. El paraíso."];
function cargarEscenarios(){const sel=document.getElementById('escenario');escenarios.forEach((e,i)=>sel.innerHTML+=`<option value="${i}">${e}</option>`)}
function mostrarRespuesta(){let i=document.getElementById('escenario').value;document.getElementById('resp').innerText=respuestas[i];desbloquearLogro(24);if(i>=10)desbloquearLogro(48);if(i>=20)desbloquearLogro(49)}

// LOGROS
function renderLogros(){
  let hechos=logros.filter(l=>l).length;
  document.getElementById('contLogros').innerText=` ${hechos}/60`;
  let html='';logros.forEach((l,i)=>html+=`<div class="logro ${l?'done':''}">${l?'✅':'⬜'} ${nombresLogros[i]}</div>`);
  document.getElementById('listaLogros').innerHTML=html;
  if(hechos>=30)desbloquearLogro(58);if(hechos>=60)desbloquearLogro(59);
}

// ESTRELLAS
const canvas=document.getElementById('stars'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}resize();window.onresize=resize;
let stars=[];for(let i=0;i<120;i++)stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+0.5,s:Math.random()*0.8+0.3,op:Math.random()});
function anim(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.op})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();s.y+=s.s;if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width}});requestAnimationFrame(anim)}anim();
</script>
</body>
  </html>
