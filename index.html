<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGC.FUN v1.7.4</title>
<style>
body{background:#020211;color:#fff;font-family:Arial;margin:0}
header{padding:15px;background:#000;border-bottom:2px solid #00f7ff;text-align:center}
h1{color:#00f7ff;margin:0}
nav{display:flex;justify-content:center;gap:10px;margin-top:10px}
nav button{background:#0a0a1a;border:2px solid #00f7ff;color:#00f7ff;padding:8px 15px;border-radius:8px;cursor:pointer}
nav button.active{background:#00f7ff;color:#000}
.card{display:none;padding:20px;max-width:600px;margin:0 auto}
.card.active{display:block}
#btnLogros{position:fixed;top:15px;left:15px;background:#ffd700;border:none;color:#000;padding:10px;border-radius:50%;font-size:18px;cursor:pointer;z-index:100}
#panelLogros{position:fixed;top:0;right:-350px;width:320px;height:100%;background:#111;border-left:2px solid #ffd700;transition:0.3s;padding:20px;overflow-y:auto;z-index:99}
#panelLogros.open{right:0}
.btn{background:#00f7ff;color:#000;border:none;padding:10px 15px;border-radius:8px;margin:5px;cursor:pointer;font-weight:bold}
.btn-rojo{background:#ff0033;color:#fff}
#tateti{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:270px;margin:20px auto}
.celda{width:90px;height:90px;background:#111;border:3px solid #00f7ff;display:flex;align-items:center;justify-content:center;font-size:40px;color:#00f7ff;cursor:pointer;font-weight:bold}
#draw,#draw2{border:2px solid #00f7ff;background:#000;cursor:crosshair}
</style>
</head>
<body>
<button id="btnLogros" onclick="document.getElementById('panelLogros').classList.toggle('open')">🏆</button>
<div id="panelLogros"><h2>Logros <span id="contLogros"></span></h2><div id="listaLogros"></div></div>

<header>
<h1>⚡ LGC.FUN v1.7.4</h1>
<nav>
<button class="active" onclick="show('lab')">Laboratorio</button>
</nav>
</header>

<div id="lab" class="card active">
<h2>Laboratorio</h2>
<button class="btn" onclick="showExp('tateti')">Ta-Te-Ti</button>
<button class="btn" onclick="showExp('circulo')">Círculo Perfecto</button>
<button class="btn" onclick="showExp('dibujo')">Dibujo Libre</button>
<div id="exp-area" style="margin-top:20px"></div>
</div>

<script>
let logros=Array(120).fill(false);
const nombresLogros=Array(120).fill().map((_,i)=>`Logro ${i+1}`);

function show(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showExp(t){
  let html='';
  if(t=='tateti')html=`<h3>Ta-Te-Ti</h3><div id="tateti"></div><button class="btn" onclick="resetT()">Reiniciar</button><p id="msgT"></p>`;
  if(t=='circulo')html=`<h3>Círculo Perfecto - Dibuja encima para borrar</h3><canvas id="draw" width="300" height="300"></canvas><p id="porcentaje"></p>`;
  if(t=='dibujo')html=`<h3>Dibujo Libre</h3><canvas id="draw2" width="300" height="300"></canvas><br><button class="btn btn-rojo" onclick="limpiar2()">LIMPIAR</button>`;
  document.getElementById('exp-area').innerHTML=html;
  if(t=='tateti')crearT();if(t=='circulo')initDraw('draw',false);if(t=='dibujo')initDraw('draw2',true);
}

// TATETI QUE SÍ ANDA
let tab=Array(9).fill('');
function crearT(){let h='';for(let i=0;i<9;i++)h+=`<div class="celda" onclick="jugar(${i})"></div>`;document.getElementById('tateti').innerHTML=h;document.getElementById('msgT').innerText='Tu turno X'}
function jugar(i){if(tab[i]!='')return;tab[i]='X';actualizar();if(check('X'))return fin('Ganaste!');let v=tab.indexOf('');if(v==-1)return fin('Empate');tab[v]='O';actualizar();if(check('O'))fin('Perdiste!')}
function actualizar(){document.querySelectorAll('.celda').forEach((c,i)=>c.innerText=tab[i])}
function check(j){return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(c=>c.every(i=>tab[i]==j))}
function fin(txt){document.getElementById('msgT').innerText=txt}
function resetT(){tab=Array(9).fill('');crearT()}

// DIBUJO QUE SÍ ANDA
let dib=false,ctx;
function initDraw(id,libre){
  const c=document.getElementById(id);ctx=c.getContext('2d');dib=false;
  c.onmousedown=e=>{dib=true;if(!libre)ctx.clearRect(0,0,300,300);ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY)}
  c.onmousemove=e=>{if(dib){ctx.lineTo(e.offsetX,e.offsetY);ctx.strokeStyle='#00f7ff';ctx.lineWidth=4;ctx.stroke()}}
  c.onmouseup=()=>dib=false;
}
function limpiar2(){ctx.clearRect(0,0,300,300)}
</script>
</body>
</html>
