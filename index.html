<!DOCTYPE html>
<html>
<head>
  <title>LGC.FUN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:linear-gradient(#fff,#fafafa);
      overflow:hidden;
      user-select:none;
    }

.logo{
      text-align:center;
      font-size:64px;
      transform:scaleY(2.2);
      margin-top:10px;
      letter-spacing:2px;
    }

.screen{
      display:none;
      min-height:100vh;
      padding:10px;
      box-sizing:border-box;
      opacity:0;
      transform:translateY(40px) scale(0.98);
      transition: opacity 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform, opacity;
    }

.active{
      display:block;
      opacity:1;
      transform:translateY(0) scale(1);
    }

.center{
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      height:calc(100vh - 90px);
      gap:12px;
      text-align:center;
    }

.btn{
      width:min(340px,88vw);
      padding:16px;
      border:2px solid black;
      border-radius:16px;
      background:white;
      font-size:16px;
      cursor:pointer;
      transition:0.15s;
    }

.btn:active{
      transform:scale(0.98);
      background:#f5f5f5;
    }

.big{font-size:34px;}

.back{
      position:fixed;
      top:12px;
      left:12px;
      width:48px;
      height:48px;
      background:black;
      color:white;
      display:none;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      cursor:pointer;
      z-index:999;
      font-size:20px;
    }

    canvas{
      border:2px solid black;
      border-radius:12px;
      touch-action:none;
      width:min(340px,88vw);
      height:340px;
    }

    #clickBtn{
      width:260px;
      height:260px;
      border-radius:50%;
      font-size:22px;
      font-weight:bold;
    }

    #holdBtn{
      width:260px;
      height:260px;
      border-radius:50%;
      font-size:22px;
      font-weight:bold;
      border:2px solid black;
      background:white;
      transition:background 0.1s;
    }
    #holdBtn.holding{
      background:#000;
      color:white;
    }
.bar{
      width:min(340px,88vw);
      height:12px;
      border:2px solid black;
      border-radius:12px;
      overflow:hidden;
      background:#eee;
    }
.barFill{
      height:100%;
      width:0%;
      background:black;
      transition:width 0.05s linear;
    }

    /* Bloque Laboratorio */
.menuExtra{
      margin-top:50px;
      text-align:center;
      width:min(340px,88vw);
    }
.lab{
      font-size:14px;
      text-align:left;
      border-top:1px solid #ddd;
      padding-top:8px;
    }
.lab b{font-weight:bold;}
  </style>
</head>

<body>

<div class="back" id="back" onclick="show('menu')">←</div>
<div class="logo">LGC.FUN</div>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="center">
    <button class="btn" onclick="show('circle')">🔵 Círculo perfecto</button>
    <button class="btn" onclick="show('money')">💸 Dinero infinito</button>
    <button class="btn" onclick="show('clicks')">🖱️ Click infinito</button>
    <button class="btn" onclick="show('country')">🌍 País random</button>
    <button class="btn" onclick="show('chaos')">🎲 Ruleta caótica</button>
    <button class="btn" onclick="show('cps')">⚡ Click por segundo</button>
    <button class="btn" onclick="show('hold')">🤏 Aguantá el click</button>

    <!-- Laboratorio -->
    <div class="menuExtra">
      <div class="lab" id="labBlock"></div>
    </div>
  </div>
</div>

<!-- CÍRCULO -->
<div id="circle" class="screen">
  <div class="center">
    <h2>🔵 Círculo perfecto</h2>
    <canvas id="canvas" width="300" height="300"></canvas>
    <div class="big" id="res">Dibuja un círculo</div>
    <button class="btn" onclick="resetCircle()">🔁 Intentar de nuevo</button>
    <div>🏆 Récord: <span id="bestC">0</span>%</div>
  </div>
</div>

<!-- OTROS -->
<div id="money" class="screen"><div class="center"><h2>💸 Dinero</h2><div class="big">$<span id="m1">0</span></div><button class="btn" onclick="money()">Generar</button></div></div>

<div id="clicks" class="screen"><div class="center"><h2>🖱️ Click</h2><div class="big" id="c1">0</div><button class="btn" onclick="clicks()">CLICK</button></div></div>

<div id="country" class="screen"><div class="center"><h2>🌍 País</h2><div class="big" id="co">---</div><button class="btn" onclick="country()">Generar</button></div></div>

<div id="chaos" class="screen"><div class="center"><h2>🎲 Ruleta</h2><div class="big" id="ch">---</div><button class="btn" onclick="spin()">Girar</button></div></div>

<!-- CPS -->
<div id="cps" class="screen">
  <div class="center">
    <h2>⚡ CPS</h2>
    <div id="cpsMenu">
      <button class="btn" onclick="startCPS(1)">1s</button>
      <button class="btn" onclick="startCPS(2)">2s</button>
      <button class="btn" onclick="startCPS(5)">5s</button>
      <button class="btn" onclick="startCPS(10)">10s</button>
    </div>
    <button id="clickBtn" style="display:none;" onclick="addClick()">CLICK</button>
    <div class="big" id="cpsCount" style="display:none;">0</div>
    <div>🏆 Récord CPS: <span id="bestCPSText">0</span></div>
  </div>
</div>

<!-- AGUANTÁ EL CLICK -->
<div id="hold" class="screen">
  <div class="center">
    <h2>🤏 Aguantá el click</h2>
    <button id="holdBtn" onmousedown="startHold()" onmouseup="endHold()" ontouchstart="startHold()" ontouchend="endHold()">MANTENÉ</button>
    <div class="bar"><div class="barFill" id="holdBar"></div></div>
    <div class="big" id="holdTime">0.00s</div>
    <div>🏆 Récord: <span id="bestHold">0.00</span>s</div>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="center">
    <div class="big" id="finalText"></div>
    <button class="btn" onclick="show('cps')">🔁 Intentar</button>
  </div>
</div>

<script>

const VERSION = "1.1"; // Como pediste
const NOVEDADES = "Animaciones más fluidas";

/* ===== AUDIO ARCADE ===== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(f,t,type="sine"){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=type;o.frequency.value=f;
  o.connect(g);g.connect(audioCtx.destination);
  g.gain.value=0.08;
  o.start();o.stop(audioCtx.currentTime+t);
}

function sClick(){beep(800,0.05)}
function sGood(){beep(1200,0.1)}
function sBad(){beep(200,0.2,"square")}
function sFinish(){beep(600,0.15);setTimeout(()=>beep(900,0.15),100)}

let bestCPS=parseFloat(localStorage.getItem("bestCPS")||0);
let bestCircle=parseFloat(localStorage.getItem("bestCircle")||0);
let bestHold=parseFloat(localStorage.getItem("bestHold")||0);

document.getElementById("bestCPSText").innerText=bestCPS;
document.getElementById("bestC").innerText=bestCircle;
document.getElementById("bestHold").innerText=bestHold.toFixed(2);

function show(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.style.opacity="0";
    s.style.transform="translateY(40px) scale(0.98)";
  });

  setTimeout(()=>{
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    let n=document.getElementById(id);
    n.classList.add('active');

    document.getElementById("back").style.display =
      id==="menu"?"none":"flex";

    setTimeout(()=>{
      n.style.opacity="1";
      n.style.transform="translateY(0) scale(1)";
    },60);

    if(id==="menu"){
      setLabBlock(); // Pinta el Laboratorio al entrar
    }

  },220);

  resetCPS();
  resetHold();
}

function setLabBlock(){ // Solo Laboratorio, sin mensaje random
  document.getElementById("labBlock").innerHTML =
    `<b>Laboratorio</b>:<br>
     Version: ${VERSION}<br>
     <b>Novedades</b><br>
     ${NOVEDADES}`;
}

let m=0,c=0;

function clicks(){c++;sClick();if(navigator.vibrate)navigator.vibrate(10);document.getElementById("c1").innerText=c;}
function money(){m+=Math.floor(Math.random()*100);document.getElementById("m1").innerText=m;}
function country(){let a=["Argentina","Brasil","España","Francia","Japón","EEUU","México","Italia"];document.getElementById("co").innerText=a[Math.floor(Math.random()*a.length)];}
function spin(){let a=["💀","🔥","😂","💰","⚡","🌪️"];document.getElementById("ch").innerText=a[Math.floor(Math.random()*a.length)];}

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
let drawing=false,points=[];

function pos(e){
  let r=canvas.getBoundingClientRect();
  return{x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,y:(e.touches?e.touches[0].clientY:e.clientY)-r.top};
}

canvas.onmousedown=()=>{drawing=true;points=[]};
canvas.onmouseup=()=>{drawing=false;calc()};
canvas.onmousemove=e=>{if(drawing)draw(pos(e))};
canvas.ontouchstart=()=>{drawing=true;points=[]};
canvas.ontouchend=()=>{drawing=false;calc()};
canvas.ontouchmove=e=>{if(drawing)draw(pos(e))};

function draw(p){
  if(points.length){
    let l=points.at(-1);
    ctx.beginPath();
    ctx.moveTo(l.x,l.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
  }
  points.push(p);
}

function calc(){
  if(points.length<10)return;

  let s=points[0],e=points.at(-1);
  if(Math.hypot(s.x-e.x,s.y-e.y)>40){sBad();document.getElementById("res").innerText="⚠️ Te faltó cerrar el círculo";return;}

  let cx=0,cy=0;
  points.forEach(p=>{cx+=p.x;cy+=p.y});
  cx/=points.length;cy/=points.length;

  let d=[],avg=0;
  points.forEach(p=>{let dist=Math.hypot(p.x-cx,p.y-cy);d.push(dist);avg+=dist});
  avg/=points.length;

  let v=0;
  d.forEach(x=>v+=Math.abs(x-avg));
  v/=points.length;

  let score=100-(v/avg)*100;
  score+=5;score+=Math.random()*3-1.5;
  score=Math.max(0,Math.min(100,score));
  score=Math.round(score);

  if(score>=80)sGood();else if(score<40)sBad();else sClick();

  if(score>bestCircle){
    bestCircle=score;
    localStorage.setItem("bestCircle",bestCircle);
    document.getElementById("bestC").innerText=bestCircle;
  }

  document.getElementById("res").innerText=score+"%";
}

function resetCircle(){ctx.clearRect(0,0,300,300);points=[];document.getElementById("res").innerText="Dibuja un círculo";}

let cpsT=0,cpsC=0,cpsR=false;

function startCPS(t){
  cpsT=t;cpsC=0;cpsR=true;
  document.getElementById("cpsMenu").style.display="none";
  document.getElementById("clickBtn").style.display="block";
  document.getElementById("cpsCount").style.display="block";
  setTimeout(()=>{cpsR=false;finishCPS()},t*1000);
}

function addClick(){
  if(!cpsR)return;
  cpsC++;
  sClick();
  if(navigator.vibrate)navigator.vibrate(10);
  document.getElementById("cpsCount").innerText=cpsC;
}

function finishCPS(){
  let r=(cpsC/cpsT).toFixed(2);
  sFinish();

  if(r>bestCPS){
    bestCPS=r;
    localStorage.setItem("bestCPS",bestCPS);
    document.getElementById("bestCPSText").innerText=bestCPS;
  }

  document.getElementById("finalText").innerText="⏰ "+r+" CPS\n🏆 "+bestCPS;
  show("result");
}

function resetCPS(){
  cpsR=false;cpsC=0;
  document.getElementById("cpsMenu").style.display="block";
  document.getElementById("clickBtn").style.display="none";
  document.getElementById("cpsCount").style.display="none";
}

let holdStart=0, holdTimer=null, holdRunning=false, holdTarget=3.0;

function startHold(){
  if(holdRunning) return;
  holdRunning=true;
  holdStart=Date.now();
  document.getElementById("holdBtn").classList.add("holding");
  sClick();

  holdTimer=setInterval(()=>{
    let elapsed=(Date.now()-holdStart)/1000;
    document.getElementById("holdTime").innerText=elapsed.toFixed(2)+"s";
    let pct=Math.min(100, (elapsed/holdTarget)*100);
    document.getElementById("holdBar").style.width=pct+"%";

    if(elapsed>=holdTarget){
      clearInterval(holdTimer);
      sFinish();
      if(elapsed>bestHold){
        bestHold=elapsed;
        localStorage.setItem("bestHold",bestHold);
        document.getElementById("bestHold").innerText=bestHold.toFixed(2);
      }
      document.getElementById("holdTime").innerText="✅ "+elapsed.toFixed(2)+"s";
      holdRunning=false;
    }
  },50);
}

function endHold(){
  if(!holdRunning) return;
  clearInterval(holdTimer);
  let elapsed=(Date.now()-holdStart)/1000;
  document.getElementById("holdBtn").classList.remove("holding");
  sBad();

  if(elapsed<holdTarget){
    document.getElementById("holdTime").innerText="💀 "+elapsed.toFixed(2)+"s";
  }
  holdRunning=false;
}

function resetHold(){
  clearInterval(holdTimer);
  holdRunning=false;
  document.getElementById("holdBtn").classList.remove("holding");
  document.getElementById("holdTime").innerText="0.00s";
  document.getElementById("holdBar").style.width="0%";
}

</script>

</body>
                                 </html>
