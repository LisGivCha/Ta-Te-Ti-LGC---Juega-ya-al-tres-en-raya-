<!DOCTYPE html>
<html>
<head>
  <title>LGC.FUN</title>

  <style>
    body {
      font-family: Arial;
      background: white;
      color: black;
      text-align: center;
      margin: 0;
      padding: 30px;
      overflow-x: hidden;
    }

    .logo {
      font-size: 60px;
      letter-spacing: 8px;
      transform: scaleY(1.6);
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* PANTALLAS CON ANIMACIÓN */
    .screen {
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: 0.4s ease;
      position: absolute;
      width: 100%;
      left: 0;
    }

    .active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      position: relative;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      width: 260px;
      padding: 14px;
      border: 2px solid black;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: black;
      color: white;
    }

    .big {
      font-size: 40px;
      margin: 20px;
    }

    /* BACK BUTTON */
    .back {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      background: black;
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    .arrow {
      color: white;
      font-size: 24px;
    }

    canvas {
      border: 2px solid black;
      border-radius: 12px;
      touch-action: none;
    }

    @keyframes shake {
      0% {transform: translate(2px,2px);}
      50% {transform: translate(-2px,-2px);}
      100% {transform: translate(2px,2px);}
    }

    .shake {
      animation: shake 0.1s infinite;
    }
  </style>
</head>

<body>

<div id="backBtn" class="back" onclick="show('menu')">
  <div class="arrow">←</div>
</div>

<h1 class="logo">LGC.FUN</h1>

<!-- ================= MENU ================= -->
<div id="menu" class="screen active">
  <div class="menu">
    <button class="btn" onclick="show('clicks')">🖱️ Click infinito</button>
    <button class="btn" onclick="show('money')">💸 Dinero infinito</button>
    <button class="btn" onclick="show('chaos')">🎲 Ruleta caótica</button>
    <button class="btn" onclick="show('country')">🌍 País random</button>
    <button class="btn" onclick="show('destroy')">💥 Romper pantalla</button>
    <button class="btn" onclick="show('destiny')">🔮 Destino</button>
    <button class="btn" onclick="show('circle')">🔵 Círculo perfecto (IA)</button>
  </div>
</div>

<!-- CLICK -->
<div id="clicks" class="screen">
  <h2>🖱️ Click infinito</h2>
  <div class="big" id="c1">0</div>
  <button class="btn" onclick="addClick()">CLICK</button>
</div>

<!-- MONEY -->
<div id="money" class="screen">
  <h2>💸 Dinero infinito</h2>
  <div class="big">$<span id="m1">0</span></div>
  <button class="btn" onclick="addMoney()">Generar</button>
</div>

<!-- CHAOS -->
<div id="chaos" class="screen">
  <h2>🎲 Ruleta caótica</h2>
  <div class="big" id="ch">---</div>
  <button class="btn" onclick="spin()">Girar</button>
</div>

<!-- COUNTRY -->
<div id="country" class="screen">
  <h2>🌍 País random</h2>
  <div class="big" id="co">---</div>
  <button class="btn" onclick="genCountry()">Generar</button>
</div>

<!-- DESTROY -->
<div id="destroy" class="screen">
  <h2>💥 Romper pantalla</h2>
  <button class="btn" onclick="boom()">Activar caos</button>
</div>

<!-- DESTINY -->
<div id="destiny" class="screen">
  <h2>🔮 Destino</h2>
  <div class="big" id="de">---</div>
  <button class="btn" onclick="go()">Descubrir</button>
</div>

<!-- CIRCLE -->
<div id="circle" class="screen">
  <h2>🔵 Círculo perfecto (IA)</h2>

  <canvas id="canvas" width="300" height="300"></canvas>

  <div class="big" id="res">Dibuja un círculo</div>

  <div class="big" id="best">Mejor récord: 0%</div>

  <button class="btn" onclick="resetCircle()">🔁 Volver a intentar</button>
</div>

<script>

/* ================= NAV ================= */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.remove('active');
  });

  setTimeout(()=>{
    document.getElementById(id).classList.add('active');
  },50);

  document.getElementById("backBtn").style.display =
    (id === "menu") ? "none" : "flex";

  if(id === "circle") loadRecord();
}

/* ================= CLICK ================= */
let c1=0;
function addClick(){
  c1++;
  document.getElementById("c1").innerText=c1;
}

/* ================= MONEY ================= */
let m=0;
function addMoney(){
  m += Math.floor(Math.random()*100);
  document.getElementById("m1").innerText=m;
}

/* ================= CHAOS ================= */
function spin(){
  let a=["💀 Perdiste","🔥 Ganaste","😂 Nada","💰 Bonus","⚡ Boom"];
  document.getElementById("ch").innerText =
    a[Math.floor(Math.random()*a.length)];
}

/* ================= COUNTRY ================= */
function genCountry(){
  let a=[
    "Argentina","Brasil","Francia","Alemania","España","Inglaterra",
    "Portugal","Italia","Países Bajos","Bélgica","Croacia","Uruguay",
    "México","EEUU","Canadá","Colombia","Chile","Perú","Japón","Corea del Sur"
  ];

  document.getElementById("co").innerText =
    a[Math.floor(Math.random()*a.length)];
}

/* ================= DESTROY ================= */
function boom(){
  document.body.classList.toggle("shake");
}

/* ================= DESTINY ================= */
function go(){
  let a=[
    "Serás millonario 💰",
    "Te irá bien 👍",
    "Algo raro 👀",
    "Cambio de vida 🔄",
    "Serás famoso ⭐"
  ];

  document.getElementById("de").innerText =
    a[Math.floor(Math.random()*a.length)];
}

/* ================= CIRCLE IA ================= */

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

let drawing=false;
let points=[];
let finished=false;

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mousemove",move);
canvas.addEventListener("mouseup",end);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchmove",move);
canvas.addEventListener("touchend",end);

function start(){
  if(finished) return;
  drawing=true;
  points=[];
}

function move(e){
  if(!drawing || finished) return;

  const r=canvas.getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;

  points.push({x,y});
  ctx.fillRect(x,y,2,2);
}

function end(){
  drawing=false;
  if(!finished) calc();
}

/* IA + score */
function calc(){
  if(points.length<10) return;

  let cx=0,cy=0;
  points.forEach(p=>{cx+=p.x;cy+=p.y});
  cx/=points.length;
  cy/=points.length;

  let avg=0;
  points.forEach(p=>{
    avg+=Math.hypot(p.x-cx,p.y-cy);
  });
  avg/=points.length;

  let err=0;
  points.forEach(p=>{
    err+=Math.abs(Math.hypot(p.x-cx,p.y-cy)-avg);
  });

  let base=Math.max(0,100-err*2);
  let noise=Math.random()*6-3;

  let score=Math.round(Math.max(0,Math.min(100,base+noise)));

  document.getElementById("res").innerText =
    "Perfección IA: " + score + "% " + (score>80?"🔥 Lo hiciste":"");

  finished=true;
  saveRecord(score);
}

/* RECORD */
function saveRecord(score){
  let best=localStorage.getItem("circle_best")||0;

  if(score>best){
    localStorage.setItem("circle_best",score);
    best=score;
  }

  document.getElementById("best").innerText =
    "Mejor récord: " + best + "%";
}

function loadRecord(){
  let best=localStorage.getItem("circle_best")||0;
  document.getElementById("best").innerText =
    "Mejor récord: " + best + "%";
}

/* RESET */
function resetCircle(){
  finished=false;
  points=[];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  document.getElementById("res").innerText="Dibuja un círculo";
}

</script>

</body>
                      </html>
